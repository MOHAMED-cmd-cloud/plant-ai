<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نباتي الذكي | كاشف الأمراض والمستشار الزراعي</title>
    
    <link rel="icon" type="image/png" href="favicon.png">

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.9.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
    
    <style>
        :root {
            --primary: #27ae60;
            --secondary: #2ecc71;
            --bg: #f4f7f6;
            --text: #2d3436;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* الهيدر */
        nav {
            background: var(--primary);
            color: white;
            width: 100%;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .main-container {
            width: 90%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
        }

        /* منطقة رفع الصورة */
        .upload-area {
            border: 3px dashed var(--primary);
            background: #f9fffb;
            padding: 40px 20px;
            border-radius: 15px;
            cursor: pointer;
            position: relative;
            transition: 0.3s;
        }

        .upload-area:hover { background: #eefdf3; }

        #imageUpload {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; cursor: pointer;
        }

        #preview {
            max-width: 100%;
            border-radius: 12px;
            margin-top: 15px;
            display: none;
        }

        /* أزرار التحكم */
        #predictBtn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.1rem;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            display: none;
            font-weight: bold;
        }

        /* مؤشر التحميل */
        .loader {
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            width: 40px; height: 40px;
            animation: spin 1s linear infinite;
            display: none;
            margin: 15px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* صندوق النتائج */
        #result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            display: none;
            text-align: right;
            background: #fff;
            border-right: 6px solid var(--primary);
        }

        /* صندوق نصيحة اليوم */
        .advice-box {
            background: #fff9db;
            border: 1px solid #ffe066;
            padding: 15px;
            border-radius: 15px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            text-align: right;
        }

        footer {
            margin-top: 40px;
            padding-bottom: 20px;
            color: #7f8c8d;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<nav>🍃 منصة نباتي الذكية</nav>

<div class="main-container">
    
    <div class="card">
        <div class="upload-area">
            <div style="font-size: 40px;">📸</div>
            <p id="uploadText">اضغط هنا لتصوير ورقة النبات</p>
            <input type="file" id="imageUpload" accept="image/*">
        </div>

        <img id="preview" alt="المعاينة">
        <div class="loader" id="loader"></div>
        <button id="predictBtn" onclick="startAnalysis()">فحص الحالة الآن 🔍</button>

        <div id="result-box">
            <h3 id="diseaseName" style="margin: 0 0 10px 0;"></h3>
            <div id="medicineInfo" style="background: #f0fdf4; padding: 12px; border-radius: 8px; font-size: 0.95rem;"></div>
            <p id="accuracy" style="font-size: 0.75rem; color: #95a5a6; margin-top: 10px;"></p>
        </div>
    </div>

    <div class="advice-box">
        <span style="font-size: 24px;">💡</span>
        <div>
            <strong style="display: block; color: #856404; margin-bottom: 4px;">نصيحة اليوم:</strong>
            <span id="advice-text">جاري اختيار نصيحة مفيدة...</span>
        </div>
    </div>

</div>

<footer>جميع الحقوق محفوظة لمنصة نباتي الذكية 2026</footer>

<script>
    const URL = "./"; 
    let model;

    // بيانات الأمراض (تأكد من مطابقة الأسماء للموديل الخاص بك)
    const plantDatabase = {
        "Tomato_Early_blight": {
            ar: "لفحة الطماطم المبكرة",
            cure: "إزالة الأوراق المصابة فوراً، ورش مبيد فطري يحتوي على النحاس."
        },
        "Potato___Late_blight": {
            ar: "لفحة البطاطس المتأخرة",
            cure: "استخدام مبيد (مانكوزيب)، وتجنب زيادة الرطوبة حول النبات."
        },
        "Healthy": {
            ar: "النبات سليم ومعافى ✨",
            cure: "استمر في العناية الدورية وتأكد من جودة الري والتسميد."
        }
    };

    // قائمة النصائح الزراعية
    const tipsList = [
        "لا تروِ النباتات في وقت الظهيرة لتجنب صدمة الجذور.",
        "تأكد من وجود فتحات تصريف في الأصيص لمنع تعفن الجذور.",
        "نظف أوراق النبات بقطعة قماش مبللة لتحسين عملية التمثيل الضوئي.",
        "استخدم ماء سلق الخضار (بعد أن يبرد) كسماد طبيعي غني بالمعادن.",
        "تجنب الإفراط في الري؛ التربة الرطبة دائماً تجذب الحشرات."
    ];

    // تحميل الموديل عند البدء
    async function init() {
        try {
            model = await tmImage.load(URL + "model.json", URL + "metadata.json");
            console.log("Model Loaded");
            showRandomTip(); // عرض النصيحة فور التشغيل
        } catch (e) {
            console.error("خطأ في تحميل الموديل");
        }
    }

    // عرض نصيحة عشوائية
    function showRandomTip() {
        const adviceElement = document.getElementById("advice-text");
        const randomIndex = Math.floor(Math.random() * tipsList.length);
        adviceElement.innerText = tipsList[randomIndex];
    }

    // التعامل مع رفع الصورة
    document.getElementById("imageUpload").addEventListener("change", function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = document.getElementById("preview");
                img.src = event.target.result;
                img.style.display = "block";
                document.getElementById("predictBtn").style.display = "block";
                document.getElementById("result-box").style.display = "none";
                document.getElementById("uploadText").innerText = "تغيير الصورة 🔄";
            }
            reader.readAsDataURL(file);
        }
    });

    // وظيفة الفحص
    async function startAnalysis() {
        const loader = document.getElementById("loader");
        const resultBox = document.getElementById("result-box");
        const btn = document.getElementById("predictBtn");
        const img = document.getElementById("preview");

        loader.style.display = "block";
        btn.style.display = "none";
        resultBox.style.display = "none";

        const prediction = await model.predict(img);
        
        // محاكاة تأخير بسيط للجمالية
        setTimeout(() => {
            let best = prediction.sort((a, b) => b.probability - a.probability)[0];
            const info = plantDatabase[best.className] || { ar: "غير معروف", cure: "يرجى استشارة مختص زراعي." };

            loader.style.display = "none";
            btn.style.display = "block";
            resultBox.style.display = "block";

            document.getElementById("diseaseName").innerText = "الحالة: " + info.ar;
            document.getElementById("diseaseName").style.color = (best.className === "Healthy") ? "#27ae60" : "#c0392b";
            document.getElementById("medicineInfo").innerHTML = "<strong>💊 العلاج المقترح:</strong><br>" + info.cure;
            document.getElementById("accuracy").innerText = "دقة التحليل: " + (best.probability * 100).toFixed(0) + "%";
            
            // تحديث النصيحة عند كل فحص جديد لزيادة التفاعل
            showRandomTip();
        }, 1200);
    }

    // تشغيل النظام
    init();
</script>

</body>
</html>
